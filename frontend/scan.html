<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanning… — LaunchSafe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/common.css">
<style>
  #screen-scan {
    min-height: calc(100vh - 65px);
    display: flex; align-items: flex-start; justify-content: center; padding: 60px 40px;
  }
  .scan-container { width: 100%; max-width: 640px; }
  .scan-header { margin-bottom: 28px; }
  .scan-header h2 { font-family: var(--serif); font-size: 32px; color: #fff; margin-bottom: 6px; }
  .scan-header p { color: var(--muted); font-size: 13px; font-family: var(--mono); }
  .scan-header .elapsed { color: var(--accent); }

  .recon-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 18px; margin-bottom: 20px;
  }
  .recon-card h4 { font-size: 11px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
  .recon-card .stack { font-size: 14px; color: var(--text); margin-bottom: 8px; }
  .recon-card .sum { font-size: 12px; color: var(--muted); line-height: 1.55; margin-bottom: 10px; }
  .recon-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .recon-tag { font-family: var(--mono); font-size: 10px; padding: 3px 8px; border: 1px solid var(--border2); border-radius: 4px; color: var(--muted); }
  .recon-tag.on { color: var(--accent); border-color: rgba(200,241,53,0.4); background: rgba(200,241,53,0.06); }

  .working-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-radius: 10px; border: 1px solid var(--accent);
    background: rgba(200,241,53,0.05);
  }
  .spinner { width: 12px; height: 12px; border: 1.5px solid rgba(200,241,53,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .working-label { font-family: var(--mono); font-size: 12px; color: var(--accent); }

  .branches-panel {
    margin-top: 18px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }
  .branches-head {
    padding: 10px 16px; font-family: var(--mono); font-size: 10px;
    color: var(--muted); text-transform: uppercase; letter-spacing: .08em;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .branches-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px; padding: 12px;
  }
  .branch-card {
    border: 1px solid var(--border2); border-radius: 8px;
    padding: 10px 12px; background: var(--bg);
    display: flex; flex-direction: column; gap: 4px;
  }
  .branch-card .b-name {
    font-family: var(--mono); font-size: 11px; color: var(--text);
    display: flex; align-items: center; gap: 6px;
  }
  .branch-card .b-meta {
    font-family: var(--mono); font-size: 10px; color: var(--muted);
  }
  .branch-card.b-pending  { opacity: .55; }
  .branch-card.b-running  { border-color: var(--accent); background: rgba(200,241,53,0.05); }
  .branch-card.b-done     { border-color: rgba(6,214,160,0.4); }
  .branch-card.b-error    { border-color: var(--orange); }
  .b-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    background: var(--border2);
  }
  .branch-card.b-running .b-dot { background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
  .branch-card.b-done    .b-dot { background: var(--green); }
  .branch-card.b-error   .b-dot { background: var(--orange); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }

  .event .branch {
    font-family: var(--mono); font-size: 9px; padding: 1px 6px;
    border: 1px solid var(--border2); border-radius: 3px;
    color: var(--muted); flex-shrink: 0; text-transform: lowercase;
    letter-spacing: .04em; min-width: 64px; text-align: center;
  }
  .event .branch.b-recon      { color: var(--yellow); border-color: rgba(255,209,102,0.4); }
  .event .branch.b-payments   { color: #ff7eb6; border-color: rgba(255,126,182,0.4); }
  .event .branch.b-iac        { color: #b5a4ff; border-color: rgba(181,164,255,0.4); }
  .event .branch.b-auth       { color: var(--blue); border-color: rgba(76,201,240,0.4); }
  .event .branch.b-cicd       { color: #8be9fd; border-color: rgba(139,233,253,0.4); }
  .event .branch.b-general    { color: var(--green); border-color: rgba(6,214,160,0.4); }
  .event .branch.b-synthesize { color: var(--accent); border-color: rgba(200,241,53,0.5); }

  .event.branch_start, .event.branch_done {
    border-left-color: var(--accent);
    background: rgba(200,241,53,0.03);
  }
  .event.branch_start .kind, .event.branch_done .kind { color: var(--accent); }

  .filter-bar {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .filter-chip {
    font-family: var(--mono); font-size: 10px; padding: 3px 8px;
    border: 1px solid var(--border2); border-radius: 4px;
    color: var(--muted); cursor: pointer; user-select: none;
    background: transparent;
  }
  .filter-chip.active { color: var(--accent); border-color: var(--accent); background: rgba(200,241,53,0.06); }

  .error-banner {
    background: rgba(255,77,77,0.08); border: 1px solid rgba(255,77,77,0.3);
    border-radius: 10px; padding: 14px 16px; color: var(--red);
    font-family: var(--mono); font-size: 12px; line-height: 1.5;
    margin-bottom: 20px;
  }

  .events-panel {
    margin-top: 20px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }
  .events-head {
    padding: 10px 16px; font-family: var(--mono); font-size: 10px;
    color: var(--muted); text-transform: uppercase; letter-spacing: .08em;
    border-bottom: 1px solid var(--border);
  }
  .events-list {
    max-height: 320px; overflow-y: auto; padding: 8px 0;
    font-family: var(--mono); font-size: 11px; line-height: 1.55;
  }
  .event {
    padding: 4px 16px; display: flex; gap: 10px; align-items: flex-start;
    border-left: 2px solid transparent;
  }
  .event .t { color: var(--muted); min-width: 42px; flex-shrink: 0; }
  .event .kind { min-width: 56px; flex-shrink: 0; font-weight: 500; text-transform: uppercase; font-size: 9px; letter-spacing: .06em; padding-top: 1px; }
  .event .msg { color: var(--text); word-break: break-word; white-space: pre-wrap; }
  .event.think { border-left-color: rgba(76,201,240,0.4); }
  .event.think .kind { color: var(--blue); }
  .event.think .msg { color: #bcd; font-style: italic; }
  .event.call { border-left-color: rgba(200,241,53,0.5); }
  .event.call .kind { color: var(--accent); }
  .event.call .msg { color: var(--accent); }
  .event.result { border-left-color: rgba(6,214,160,0.3); }
  .event.result .kind { color: var(--green); }
  .event.recon .kind { color: var(--yellow); }
  .event.info .kind { color: var(--muted); }
  .event.warn { border-left-color: var(--orange); }
  .event.warn .kind { color: var(--orange); }
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">LaunchSafe</a>
  <div class="nav-right">
    <span class="nav-badge">v0.1 · Python + FastAPI</span>
  </div>
</nav>
<section id="screen-scan">
  <div class="scan-container fadein">
    <div class="scan-header">
      <h2>Scanning your codebase</h2>
      <p id="status-label">Booting agent… <span class="elapsed" id="elapsed">0s</span></p>
    </div>

    <div id="error-banner" class="error-banner" style="display:none;"></div>

    <div id="recon-card" class="recon-card" style="display:none;">
      <h4>Repo profile</h4>
      <div class="stack" id="recon-stack"></div>
      <div class="sum" id="recon-summary"></div>
      <div class="recon-tags" id="recon-tags"></div>
    </div>

    <div id="working" class="working-row">
      <div class="spinner"></div>
      <div class="working-label" id="working-label">Waiting for first tool call…</div>
    </div>

    <div id="branches-panel" class="branches-panel" style="display:none;">
      <div class="branches-head">
        <span>Specialist branches</span>
        <span id="branches-counter" style="text-transform:none;letter-spacing:0;"></span>
      </div>
      <div id="branches-grid" class="branches-grid"></div>
    </div>

    <div class="events-panel">
      <div class="events-head">
        <span>Live activity</span>
        <div class="filter-bar" id="filter-bar">
          <button class="filter-chip active" data-branch="all">all</button>
        </div>
      </div>
      <div id="events-list" class="events-list"></div>
    </div>
  </div>
</section>
<script type="module" src="/src/scan.ts"></script>
</body>
</html>
