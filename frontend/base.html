<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}LaunchSafe{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1a1a1a; --bg2: #111317; --bg3: #181a1f;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --text: #e8e6e0; --muted: #b0b0b0;
    --accent: #c8f135; --accent2: #a8d420;
    --red: #ff4d4d; --orange: #ff8c42; --yellow: #ffd166; --green: #06d6a0; --blue: #4cc9f0;
    --mono: 'DM Mono', monospace; --serif: 'Instrument Serif', serif; --sans: 'DM Sans', sans-serif;
  }
  html { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 18px; line-height: 1.6; }

  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 40px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: rgba(11,12,14,0.92);
    backdrop-filter: blur(12px); z-index: 100;
  }
  .logo { font-family: var(--mono); font-size: 20px; font-weight: 500; color: var(--accent); letter-spacing: -0.02em; text-decoration: none; }
  .logo span { color: var(--muted); }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .nav-badge { font-family: var(--mono); font-size: 11px; color: var(--muted); border: 1px solid var(--border2); padding: 4px 10px; border-radius: 20px; }

  .btn-primary {
    background: var(--accent); color: #0b0c0e; font-family: var(--sans);
    font-weight: 500; font-size: 14px; padding: 10px 20px;
    border: none; border-radius: 10px; cursor: pointer; text-decoration: none;
    transition: background .15s, transform .1s; display: inline-block;
  }
  .btn-primary:hover { background: var(--accent2); }
  .btn-primary:active { transform: scale(0.98); }

  .btn-ghost {
    background: transparent; border: 1px solid var(--border2); color: var(--text);
    font-family: var(--mono); font-size: 12px; padding: 8px 16px; border-radius: 8px;
    cursor: pointer; transition: border-color .15s, color .15s; text-decoration: none; display: inline-block;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .fadein { animation: fadeUp .4s ease both; }

  @media (max-width: 700px) { nav { padding: 16px 20px; } }
</style>
{% block extra_styles %}{% endblock %}
</head>
<body>
<nav>
  <a href="/" class="logo">LaunchSafe</a>
  <div class="nav-right">
    <span class="nav-badge">v0.1 · Python + FastAPI</span>
    {% block nav_extra %}{% endblock %}
  </div>
</nav>
{% block content %}{% endblock %}
{% block scripts %}{% endblock %}
</body>
</html>
