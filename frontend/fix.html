<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fix Session — LaunchSafe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/common.css">
<style>
  #screen-fix {
    min-height: calc(100vh - 65px);
    padding: 60px 40px;
    max-width: 900px;
    margin: 0 auto;
  }
  .fix-header { margin-bottom: 28px; }
  .fix-header h2 { font-family: var(--serif); font-size: 32px; color: #fff; margin-bottom: 6px; }
  .fix-header p { color: var(--muted); font-size: 13px; font-family: var(--mono); }
  .fix-header .elapsed { color: var(--accent); }

  .working-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-radius: 10px; border: 1px solid var(--accent);
    background: rgba(200,241,53,0.05);
    margin-bottom: 20px;
  }
  .spinner { width: 12px; height: 12px; border: 1.5px solid rgba(200,241,53,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .working-label { font-family: var(--mono); font-size: 12px; color: var(--accent); }

  .events-panel {
    margin-top: 20px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }
  .events-head {
    padding: 10px 16px; font-family: var(--mono); font-size: 10px;
    color: var(--muted); text-transform: uppercase; letter-spacing: .08em;
    border-bottom: 1px solid var(--border);
  }
  .events-list {
    max-height: 320px; overflow-y: auto; padding: 8px 0;
    font-family: var(--mono); font-size: 11px; line-height: 1.55;
  }
  .event {
    padding: 4px 16px; display: flex; gap: 10px; align-items: flex-start;
    border-left: 2px solid transparent;
  }
  .event .t { color: var(--muted); min-width: 42px; flex-shrink: 0; }
  .event .kind { min-width: 56px; flex-shrink: 0; font-weight: 500; text-transform: uppercase; font-size: 9px; letter-spacing: .06em; padding-top: 1px; }
  .event .msg { color: var(--text); word-break: break-word; white-space: pre-wrap; }
  .event.info .kind { color: var(--muted); }
  .event.warn { border-left-color: var(--orange); }
  .event.warn .kind { color: var(--orange); }
  .event.error { border-left-color: var(--red); }
  .event.error .kind { color: var(--red); }

  .event .branch {
    font-family: var(--mono); font-size: 9px; padding: 1px 6px;
    border: 1px solid var(--border2); border-radius: 3px;
    color: var(--muted); flex-shrink: 0; text-transform: lowercase;
    letter-spacing: .04em; min-width: 64px; text-align: center;
  }

  .error-banner {
    background: rgba(255,77,77,0.08); border: 1px solid rgba(255,77,77,0.3);
    border-radius: 10px; padding: 14px 16px; color: var(--red);
    font-family: var(--mono); font-size: 12px; line-height: 1.5;
    margin-bottom: 20px;
  }

  #fix-results { display: none; }

  .review-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; margin-bottom: 24px;
  }
  .review-status {
    display: flex; align-items: center; gap: 10px; font-family: var(--sans);
    font-weight: 500; font-size: 18px; margin-bottom: 12px;
  }
  .status-approved { color: var(--green); }
  .status-warning { color: var(--orange); }
  .review-notes {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 12px;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: anywhere;
  }
  .review-warnings ul { padding-left: 20px; font-size: 13px; color: var(--orange); margin-bottom: 12px; }
  .review-conflicts ul { padding-left: 20px; font-size: 13px; color: var(--red); }

  .group-card {
    background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
    margin-bottom: 20px; overflow: hidden;
  }
  .group-header {
    background: var(--bg2); padding: 16px 20px; border-bottom: 1px solid var(--border);
  }
  .group-header h3 { font-family: var(--sans); font-size: 15px; margin-bottom: 4px; color: var(--text); font-weight: 500; }
  .group-header .group-id-sub { font-family: var(--mono); font-size: 11px; color: var(--muted); margin: 0 0 8px 0; }
  .group-header .group-notes { font-size: 13px; color: var(--text); line-height: 1.55; }
  .group-notes-text {
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: anywhere;
    margin: 0 0 12px 0;
  }
  .group-repo-hits {
    margin-top: 8px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: rgba(0,0,0,0.2);
  }
  .group-repo-hits summary {
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    user-select: none;
  }
  .repo-hits-list {
    margin: 10px 0 0 0;
    padding-left: 18px;
    max-height: 280px;
    overflow-y: auto;
    font-size: 11px;
  }
  .repo-hit-line {
    display: block;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: anywhere;
    margin: 4px 0;
    color: var(--text);
  }

  .patch-sanity {
    font-size: 12px; color: var(--orange); margin-bottom: 12px;
    padding: 10px 12px; border-radius: 8px; border: 1px solid rgba(255,180,80,0.25);
    background: rgba(255,180,80,0.06);
  }
  .patch-sanity ul { margin: 6px 0 0 0; padding-left: 18px; }

  .patch-item {
    padding: 20px; border-bottom: 1px solid var(--border2);
  }
  .patch-item:last-child { border-bottom: none; }
  .patch-path { font-family: var(--mono); font-size: 12px; color: var(--text); margin-bottom: 8px; font-weight: 500; }
  .patch-explanation {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 12px;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: anywhere;
  }

  /* One visual row per diff line; inner <code> keeps alignment without collapsing lines. */
  .diff-block {
    background: #0b0c0e;
    border: 1px solid var(--border2);
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 12px;
    padding: 0;
    overflow-x: auto;
    white-space: normal;
  }
  .diff-line {
    display: block;
    margin: 0;
    min-height: 1.5em;
    line-height: 1.5;
    padding: 4px 12px 4px 10px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    border-left: 3px solid transparent;
  }
  .diff-line:last-child {
    border-bottom: none;
  }
  .diff-code {
    display: block;
    white-space: pre;
    overflow-x: auto;
    margin: 0;
    padding: 0;
    font: inherit;
    color: inherit;
  }
  .diff-line.diff-ctx { color: rgba(255, 255, 255, 0.5); }
  .diff-line.diff-header {
    color: #4cc9f0;
    background: rgba(76, 201, 240, 0.06);
    border-left-color: #4cc9f0;
  }
  .diff-line.diff-add {
    color: #06d6a0;
    background: rgba(6, 214, 160, 0.1);
    border-left-color: #06d6a0;
  }
  .diff-line.diff-remove {
    color: #ff4d4d;
    background: rgba(255, 77, 77, 0.1);
    border-left-color: #ff4d4d;
  }

  .action-row {
    margin-top: 30px; display: flex; justify-content: flex-end; gap: 12px;
  }
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">LaunchSafe</a>
  <div class="nav-right">
    <span class="nav-badge">v0.1 · Python + FastAPI</span>
  </div>
</nav>
<section id="screen-fix">
  <div class="fix-header fadein">
    <h2>Fix Agent Session</h2>
    <p id="status-label">Initializing… <span class="elapsed" id="elapsed">0s</span></p>
  </div>

  <div id="error-banner" class="error-banner" style="display:none;"></div>

  <div id="working" class="working-row">
    <div class="spinner"></div>
    <div class="working-label" id="working-label">Loading scan context…</div>
  </div>

  <div id="events-panel" class="events-panel">
    <div class="events-head">
      <span>Agent Log</span>
    </div>
    <div id="events-list" class="events-list"></div>
  </div>

  <div id="fix-results" class="fadein">
    <div class="review-card" id="review-card">
      <div class="review-status" id="review-status"></div>
      <div class="review-notes" id="review-notes"></div>
      <div class="review-warnings" id="review-warnings" style="display:none;"></div>
      <div class="review-conflicts" id="review-conflicts" style="display:none;"></div>
    </div>

    <div id="groups-container"></div>

    <div class="action-row">
      <a id="back-to-report" href="#" class="btn-ghost">Back to Report</a>
      <button class="btn-primary" onclick="alert('Applying patches via GitHub API / local diff tool is coming soon!')">Apply Fixes</button>
    </div>
  </div>
</section>
<script type="module" src="/src/fix.ts"></script>
</body>
</html>
